<!DOCTYPE html>
<!-- Test case for Issue #1032: CSS Nesting nested @media and @supports adapted from WPT -->
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <title>CSS Nesting Conditionals</title>
    <style>
      @page {
        size: 160mm 120mm;
        margin: 10mm;
      }

      body {
        font: 16px/1.4 Georgia, serif;
      }

      .row {
        margin: 0 0 4mm;
      }

      .test {
        background-color: red;
        width: 26mm;
        height: 26mm;
        display: inline-grid;
        margin-right: 4mm;
      }

      .test-nested-rule > div {
        width: 100%;
        height: 100%;
        background-color: red;
      }

      .test-media {
        @media print {
          background-color: green;
        }
      }

      .test-supports {
        @supports (display: grid) {
          background-color: green;
        }
      }

      .test-nested-rule {
        @media print {
          & > div {
            background-color: green;
          }
        }
      }
    </style>
  </head>
  <body>
    <p>Tests pass if all three boxes are green.</p>
    <div class="row">
      <div class="test test-media"></div>
      <div class="test test-supports"></div>
      <div class="test test-nested-rule"><div></div></div>
    </div>
  </body>
  </html>
